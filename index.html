<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
    </header>
    <main>
        <div class="container">
            <button id="generate-btn">Generate Numbers</button>
            <div id="lotto-numbers" class="lotto-numbers-container"></div>
        </div>

        <div class="container inquiry-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/mpqkdvpl" method="POST" id="inquiry-form">
                <div class="form-group">
                    <label for="name">Name / Company</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name or company">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="How can we collaborate?"></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </main>
    <footer>
        <p>Good luck!</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>

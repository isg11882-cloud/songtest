<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <header>
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
    </header>
    <main>
        <div class="container">
            <button id="generate-btn">Generate Numbers</button>
            <div id="lotto-numbers" class="lotto-numbers-container"></div>
        </div>

        <div class="container logo-search-section">
            <h2>Logo Similarity Search</h2>
            <p>Upload a logo to find similar ones.</p>
            <div id="drop-zone" class="drop-zone">
                <span class="drop-zone__prompt">Drop logo file here or click to upload</span>
                <input type="file" name="logoFile" id="logo-input" class="drop-zone__input" accept="image/*">
            </div>
            <div id="image-preview" class="image-preview" style="display: none;">
                <img src="" alt="Preview" id="preview-img">
                <button id="analyze-btn">Analyze Logo</button>
            </div>
            <div id="analysis-results" class="analysis-results" style="display: none;">
                <h3>Similar Logos Found</h3>
                <div class="results-grid" id="results-grid">
                    <!-- Results will be injected here -->
                </div>
            </div>
        </div>

        <div class="container inquiry-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/mpqkdvpl" method="POST" id="inquiry-form">
                <div class="form-group">
                    <label for="name">Name / Company</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name or company">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="How can we collaborate?"></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <div class="container comment-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://songtest-1.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </main>
    <footer>
        <p>Good luck!</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
